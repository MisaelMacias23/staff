<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="css/style.css" /> 

    <link rel="shortcut icon" href="https://ecosistemasglobal.com/wp-content/uploads/2022/06/Isologo.png" type="image/x-icon">

    <title>Marlen Salazar</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  </head>
  <body>
    <div class="container">
      <div class="sidebar animate__animated animate__slideInLeft">
        <div class="info">
          <div class="info__avatar_6">
            <a href="mailto: asalazar@ecosistemasmexico.com">
              <div class="float-email">
                <svg class="float-email__icon">
                  <use xlink:href="assets/img/sprite.svg#icon-mail"></use>
                </svg>
              </div>
            </a>
          </div>
          <h2 class="info__title">Marlen Salazar</h2>
          <h3 class="info__subtitle">Asistente Comercial</h3>
          <div class="info__contact">
            <a href="https://www.linkedin.com/in/marlens140794" target="_blank">
              <svg class="contact-icon">
                <use xlink:href="assets/img/sprite.svg#icon-linkedin"></use>
              </svg>
            </a>
            <a href="https://wa.me/5519119179" target="_blank">
              <svg class="contact-icon">
                <use xlink:href="assets/img/sprite.svg#icon-whatsapp"></use>
              </svg>
            </a>
          </div>
        </div>

        <div class="info__footer">
          <div>
            <svg class="contact-icon--footer">
              <use xlink:href="assets/img/sprite.svg#icon-mail"></use>
            </svg>
            <a href="mailto: asalazar@ecosistemasmexico.com" class="info__link">
              <span>asalzar@ecosistemasmexico.com</span>
            </a>
          </div>
          <div>
            <svg class="contact-icon--footer">
              <use xlink:href="assets/img/sprite.svg#icon-phone"></use>
            </svg>
            <a href="tel:+52 55 1911 9179" class="info__link">
              <span>+52 55 1911 9179</span>
            </a>
          </div>
        </div>
        
      </div>

      <main class="main animate__animated animate__delay-1s animate__slideInRight">
        <div class="bg-video">
          <img src="assets/img/background-new.png" class="img-fluid" alt="Background Image" />
        </div>
        <div class="cv">
          <h2 class="cv__title">Presentación</h2>
          <section class="section">
            <div class="text-center mt-3 mb-4">
              <a href="assets/Brochure-Servicios-Ecosistemas.pdf" download class="btn btn-primary">
                Descargar PDF
              </a>
            </div>

            <div class="image-container text-center">
              <img 
                src="assets/img/infografia/info-ecosistemas-gaby.jpeg" 
                class="img-fluid rounded shadow" 
                alt="Infografía Ecosistemas Global - Innovation That Scales" 
              />
            </div>
            </section>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
